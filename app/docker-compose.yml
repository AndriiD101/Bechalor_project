version: "3.9"

services:
  connect4:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/backend/data
    environment:
      - DATABASE_URL=sqlite:////app/backend/data/connect4.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/agents')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data: